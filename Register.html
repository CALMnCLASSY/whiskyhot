<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    <title>WHISKYHOT | Register</title>
    <link rel="icon" type="image/x-icon" href="/static/assets/imglogin/favicon.ico" />
    <!-- BEGIN GLOBAL MANDATORY STYLES -->
    <link href="https://fonts.googleapis.com/css?family=Quicksand:400,500,600,700&display=swap" rel="stylesheet">
    <link href="/static/assets/bootstraplogin/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/static/assets/csslogin/plugins.css" rel="stylesheet" type="text/css" />
    <link href="/static/assets/csslogin/authentication/form-2.css" rel="stylesheet" type="text/css" />
    <!-- END GLOBAL MANDATORY STYLES -->
    <link rel="stylesheet" type="text/css" href="/static/assets/csslogin/forms/theme-checkbox-radio.css">
    <link rel="stylesheet" type="text/css" href="/static/assets/csslogin/forms/switches.css">
</head>

<body class="form">


    <div class="form-container outer">
        <div class="form-form">
            <div class="form-form-wrap">
                <div class="form-container">
                    <div class="form-content">

                        <h1 class="">Register</h1>
                        <p class="">Create an account to continue.</p><br>



                        <p id="error-message" style="color: red; display: none; margin-bottom: 10px;"></p>
                        <form class="text-left" id="register-form">
                            <div class="form">

                                <div id="username-field" class="field-wrapper input">
                                    <label for="email">EMAIL ADDRESS</label>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" class="feather feather-user">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                    <input id="email" name="email" type="email" class="form-control"
                                        placeholder="e.g. john@example.com" required>
                                </div>

                                <div id="password-field" class="field-wrapper input mb-2">
                                    <div class="d-flex justify-content-between">
                                        <label for="password">PASSWORD</label>

                                    </div>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" class="feather feather-lock">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                    </svg>
                                    <input id="password" name="password" type="password" class="form-control"
                                        placeholder="Password" required>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" id="toggle-password" class="feather feather-eye">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </div>
                                <div id="confirm-password-field" class="field-wrapper input mb-2">
                                    <div class="d-flex justify-content-between">
                                        <label for="confirm-password">CONFIRM PASSWORD</label>
                                    </div>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" class="feather feather-lock">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                    </svg>
                                    <input id="confirm-password" name="confirm-password" type="password"
                                        class="form-control" placeholder="Confirm Password" required>
                                </div>
                                <div class="d-sm-flex justify-content-between">
                                    <div class="field-wrapper">
                                        <button type="submit" class="btn btn-primary"
                                            id="register-btn">Register</button>
                                    </div>
                                </div>
                                <p class="signup-link">Already registered ? <a href="/login">Log In</a></p>

                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- BEGIN GLOBAL MANDATORY SCRIPTS -->
    <script src="/static/assets/jslogin/libs/jquery-3.1.1.min.js"></script>
    <script src="/static/assets/bootstraplogin/js/popper.min.js"></script>
    <script src="/static/assets/bootstraplogin/js/bootstrap.min.js"></script>

    <!-- END GLOBAL MANDATORY SCRIPTS -->
    <script src="/static/assets/jslogin/authentication/form-2.js"></script>

    <script type="module">
        import { auth, db } from "/static/assets/jslogin/firebase-config.js";
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const registerForm = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-message');
        const registerBtn = document.getElementById('register-btn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Error: Passwords do not match.";
                return;
            }

            errorMsg.style.display = 'none';
            registerBtn.innerText = 'Registering...';
            registerBtn.disabled = true;

            try {
                // Register user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Initialize balance to $0 in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    balance: 0,
                    name: email.split('@')[0]
                });

                window.location.href = "/Home";
            } catch (error) {
                console.error("Register Error:", error.message);
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Error: " + error.message;
                registerBtn.innerText = 'Register';
                registerBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
